services:
  ontime:
    container_name: ontime
    #image: getontime/ontime:latest
    build:
      context: .
      dockerfile: Dockerfile-build
    ports:
      - '4001:4001/tcp'
      - '8888:8888/udp'
      - '9999:9999/udp'
    volumes:
      - './ontime-data:/data/'
    environment:
      - TZ=Asia/Singapore
    restart: unless-stopped
